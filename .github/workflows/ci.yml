name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      # Qt offscreen platform + PortAudio, so the PySide6 smoke tests and the
      # sounddevice import guards work headless.
      - name: Install system libraries (Qt offscreen + PortAudio)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libopengl0 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libglib2.0-0 libportaudio2

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e . --no-deps

      # Coverage is reported, not enforced (no threshold yet).
      - name: Run tests with coverage
        env:
          QT_QPA_PLATFORM: offscreen
        run: >
          python -m pytest -q
          --cov=conf_pipeline
          --cov=conf_pipeline_control
          --cov=conf_pipeline_gui
          --cov-report=term

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e . --no-deps

      # Scope + strictness live in [tool.mypy] in pyproject.toml.
      - name: Run mypy
        run: python -m mypy
